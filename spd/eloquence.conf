# Eloquence speech-dispatcher module configuration

# Debug verbosity (0=off, 1-5=increasing detail)
Debug 0

# ECI sample rate index: 0=8kHz, 1=11kHz, 2=22kHz
EloquenceSampleRate 1

# Default voice preset (0-7):
#   0=Reed, 1=Shelley, 2=Bobby, 3=Rocko,
#   4=Glen, 5=Sandy, 6=Grandma, 7=Grandpa
EloquenceDefaultVoice 0

# Default ECI parameter values
EloquencePitchBaseline 65
EloquenceSpeed 50
EloquenceVolume 90

# Dictionary mode (0=disabled, 1=main, 2=abbv)
EloquenceDictionary 0

# Synth mode (0=sentence/phrase prediction on, 1=manual/phrase prediction off)
EloquenceSynthMode 1
